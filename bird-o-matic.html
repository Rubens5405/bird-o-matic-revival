<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Criador de Avatar - Estilo Bird-O-Matic Pro</title>
  <style>
    body {
      font-family: 'Arial Black', sans-serif;
      background-color: #2980b9;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .interface-jogo {
      display: flex;
      background: #3498db;
      border: 6px solid #fff;
      border-radius: 20px;
      padding: 20px;
      gap: 20px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.3);
      width: 950px;
      box-sizing: border-box;
    }

    .coluna-esquerda {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .canvas-container {
      position: relative;
      width: 400px;
      height: 400px;
      background-color: #ffffff;
      border: 4px solid #333;
      border-radius: 12px;
      overflow: visible; 
      display: flex;
      align-items: flex-end; 
      justify-content: center;
    }

    .personagem-container {
      position: relative;
      width: 200px;
      height: 200px;
      margin-bottom: 30px; 
      overflow: visible;
      display: flex;
      justify-content: center;
      align-items: flex-end;
    }

    .acessorio {
      position: absolute;
      height: auto;
      pointer-events: none;
      max-width: none !important;
      max-height: none !important;
      left: 50%;
      transform: translateX(-50%);
    }

    #camada-corpo {
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    #camada-chapeu   { z-index: 2; }
    #camada-oculos   { z-index: 3; }
    #camada-nariz    { z-index: 4; }
    #camada-acessorio{ z-index: 5; }
    #camada-peitoral { z-index: 6; }

    .coluna-direita {
      display: flex;
      flex: 1;
      gap: 15px;
      background: #fff;
      border-radius: 12px;
      padding: 15px;
      border: 3px solid #333;
      position: relative;
    }

    .menu-categorias {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn-categoria {
      width: 85px;
      height: 70px;
      background: #fff;
      border: 3px solid #ccc;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      font-size: 10px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .btn-categoria:hover, .btn-categoria.ativo {
      border-color: #e67e22;
      background: #f39c12;
      color: white;
    }

    .vitrine-itens {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    
    .grid-produtos {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 12px;
      height: 300px;
    }

    .slot-item {
      background: #f5f6fa;
      border: 3px solid #dcdde1;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5px;
      transition: all 0.15s;
    }

    .slot-item:hover {
      border-color: #2ecc71;
      background: #e8f8f5;
    }

    .slot-item img {
      max-width: 80%;
      max-height: 80%;
      object-fit: contain;
    }

    .slot-item.remover {
      color: #e74c3c;
      font-size: 24px;
    }
    
    .paginacao {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-top: 15px;
    }

    .btn-seta {
      background: #333;
      color: white;
      border: none;
      padding: 5px 15px;
      font-size: 18px;
      border-radius: 5px;
      cursor: pointer;
    }

    .btn-seta:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .info-pagina {
      font-size: 14px;
      color: #333;
    }

    .btn-download {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      font-weight: bold;
      background-color: #2ecc71;
      color: white;
      border: 3px solid #27ae60;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

  <div class="interface-jogo">
    
    <div class="coluna-esquerda">
      <div class="canvas-container" id="area-do-avatar">
        
        <div class="personagem-container">
          <img id="camada-corpo" src="red.webp" alt="Corpo">
          <img id="camada-chapeu" class="acessorio" src="" alt="" style="display: none;">
          <img id="camada-oculos" class="acessorio" src="" alt="" style="display: none;">
          <img id="camada-nariz" class="acessorio" src="" alt="" style="display: none;">
          <img id="camada-acessorio" class="acessorio" src="" alt="" style="display: none;">
          <img id="camada-peitoral" class="acessorio" src="" alt="" style="display: none;">
        </div>

      </div>
      <button class="btn-download" onclick="baixarPNG()">SALVAR</button>
    </div>

    <div class="coluna-direita">
      
      <div class="menu-categorias">
        <button class="btn-categoria ativo" onclick="mudarCategoria('corpo')">Corpo</button>
        <button class="btn-categoria" onclick="mudarCategoria('chapeu')">Chapéu</button>
        <button class="btn-categoria" onclick="mudarCategoria('oculos')">Óculos</button>
        <button class="btn-categoria" onclick="mudarCategoria('acessorio')">Acessório</button>
        <button class="btn-categoria" onclick="mudarCategoria('peitoral')">Peito</button>
      </div>

      <div class="vitrine-itens">
        <div class="grid-produtos" id="grid-itens"></div>

        <div class="paginacao">
          <button class="btn-seta" id="btn-ant" onclick="paginaAnterior()">&lt;</button>
          <span class="info-pagina" id="label-pagina">PAGE 1/1</span>
          <button class="btn-seta" id="btn-prox" onclick="proximaPagina()">&gt;</button>
        </div>
      </div>

    </div>
  </div>

  <script>

    const posicoesConfig = {
      'red': {
        chapeu:   { width: '310px', top: '-160px', left: '56%' },
        oculos:   { width: '210px', top: '47.5px', left: '56%' }, 
        nariz:    { width: '100px', top: '75px',   left: '50%' },
        acessorio:{ width: '150px', top: '40px',   left: '50%' },
        peitoral: { width: '200px', top: '150px',  left: '50%' }
      },
      'chuck': {
        chapeu:   { width: '350px', top: '-210px', left: '52%' },
        oculos:   { width: '140px', top: '75px',   left: '50%' }, 
        nariz:    { width: '120px', top: '75px',   left: '50%' },
        acessorio:{ width: '150px', top: '40px',   left: '50%' },
        peitoral: { width: '220px', top: '160px',  left: '50%' }
      },
      
      'bomb':    { larguraCorpo: '200px', alturaCorpo: '236px', chapeu: { width: '200px', top: '-50px', left: '50%' }, oculos: { width: '210px', top: '47.5px', left: '56%' }, nariz: { width: '100px', top: '75px', left: '50%' }, acessorio: { width: '150px', top: '40px', left: '50%' }, peitoral: { width: '150px', top: '140px', left: '50%' } },
      
      'stella':  { larguraCorpo: '270px', alturaCorpo: '200px', chapeu: { width: '200px', top: '-50px', left: '50%' }, oculos: { width: '210px', top: '47.5px', left: '56%' }, nariz: { width: '100px', top: '75px', left: '50%' }, acessorio: { width: '150px', top: '40px', left: '50%' }, peitoral: { width: '150px', top: '140px', left: '50%' } },
      'bubbles': { chapeu: { width: '200px', top: '-50px', left: '50%' }, oculos: { width: '210px', top: '47.5px', left: '56%' }, nariz: { width: '100px', top: '75px', left: '50%' }, acessorio: { width: '150px', top: '40px', left: '50%' }, peitoral: { width: '150px', top: '140px', left: '50%' } },
      'matilda': { larguraCorpo: '200px', alturaCorpo: '236px', chapeu: { width: '200px', top: '-50px', left: '50%' }, oculos: { width: '210px', top: '47.5px', left: '56%' }, nariz: { width: '100px', top: '75px', left: '50%' }, acessorio: { width: '150px', top: '40px', left: '50%' }, peitoral: { width: '150px', top: '140px', left: '50%' } },
      'terence': { larguraCorpo: '300px', alturaCorpo: '300px', chapeu: { width: '200px', top: '-50px', left: '50%' }, oculos: { width: '210px', top: '47.5px', left: '56%' }, nariz: { width: '100px', top: '75px', left: '50%' }, acessorio: { width: '150px', top: '40px', left: '50%' }, peitoral: { width: '150px', top: '140px', left: '50%' } },
      'egg':     { chapeu: { width: '200px', top: '-50px', left: '50%' }, oculos: { width: '210px', top: '47.5px', left: '56%' }, nariz: { width: '100px', top: '75px', left: '50%' }, acessorio: { width: '150px', top: '40px', left: '50%' }, peitoral: { width: '150px', top: '140px', left: '50%' } },
      'eagle':   { chapeu: { width: '200px', top: '-50px', left: '50%' }, oculos: { width: '210px', top: '47.5px', left: '56%' }, nariz: { width: '100px', top: '75px', left: '50%' }, acessorio: { width: '150px', top: '40px', left: '50%' }, peitoral: { width: '150px', top: '140px', left: '50%' } },
      'space':   { larguraCorpo: '225px', alturaCorpo: '200px', chapeu: { width: '200px', top: '-50px', left: '50%' }, oculos: { width: '210px', top: '47.5px', left: '56%' }, nariz: { width: '100px', top: '75px', left: '50%' }, acessorio: { width: '150px', top: '40px', left: '50%' }, peitoral: { width: '150px', top: '140px', left: '50%' } },
      'hal':     { chapeu: { width: '200px', top: '-50px', left: '50%' }, oculos: { width: '210px', top: '47.5px', left: '56%' }, nariz: { width: '100px', top: '75px', left: '50%' }, acessorio: { width: '150px', top: '40px', left: '50%' }, peitoral: { width: '150px', top: '140px', left: '50%' } },
      'blues':   { chapeu: { width: '200px', top: '-50px', left: '50%' }, oculos: { width: '210px', top: '47.5px', left: '56%' }, nariz: { width: '100px', top: '75px', left: '50%' }, acessorio: { width: '150px', top: '40px', left: '50%' }, peitoral: { width: '150px', top: '140px', left: '50%' } },
      'ruby':    { chapeu: { width: '200px', top: '-50px', left: '50%' }, oculos: { width: '210px', top: '47.5px', left: '56%' }, nariz: { width: '100px', top: '75px', left: '50%' }, acessorio: { width: '150px', top: '40px', left: '50%' }, peitoral: { width: '150px', top: '140px', left: '50%' } },
      'pig':    { chapeu: { width: '200px', top: '-50px', left: '50%' }, oculos: { width: '210px', top: '47.5px', left: '56%' }, nariz: { width: '100px', top: '75px', left: '50%' }, acessorio: { width: '150px', top: '40px', left: '50%' }, peitoral: { width: '150px', top: '140px', left: '50%' } }
    };

    const listaCorpos = [
      'red', 'chuck', 'bomb', 'stella', 'bubbles', 'pig', 'matilda', 
      'terence', 'egg', 'eagle', 'space', 'hal', 'blues', 'ruby'
    ];

    let categoriaAtiva = 'corpo';
    let paginaAtual = 1;
    const itensPorPagina = 9;
    let personagemAtivo = 'red';

    function obterItensCategoriaAtiva() {
      if (categoriaAtiva === 'corpo') {
        return listaCorpos.map(nome => ({ tipo: 'corpo', arquivo: nome }));
      }

      switch (categoriaAtiva) {
        case 'chapeu':
          return Array.from({length: 40}, (_, i) => ({ 
            tipo: 'item', 
            arquivo: `chapeus/${personagemAtivo}/${i + 1}.svg`, 
            camada: 'camada-chapeu' 
          }));
        case 'oculos':
          return Array.from({length: 15}, (_, i) => ({ 
            tipo: 'item', 
            arquivo: `oculos/${personagemAtivo}/${i + 1}.svg`, 
            camada: 'camada-oculos' 
          }));
        case 'acessorio':
          return Array.from({length: 15}, (_, i) => ({ 
            tipo: 'item', 
            arquivo: `acessorios/${personagemAtivo}/${i + 1}.svg`, 
            camada: 'camada-acessorio' 
          }));
        case 'peitoral':
          return Array.from({length: 15}, (_, i) => ({ 
            tipo: 'item', 
            arquivo: `bicos/${personagemAtivo}/${i + 1}.svg`, 
            camada: 'camada-peitoral' 
          }));
        default:
          return [];
      }
    }

    function mudarCategoria(novaCategoria) {
      categoriaAtiva = novaCategoria;
      paginaAtual = 1;
      
      document.querySelectorAll('.btn-categoria').forEach(btn => {
        btn.classList.remove('ativo');
        if(btn.innerText.toLowerCase().includes(novaCategoria.substring(0,4))) {
          btn.classList.add('ativo');
        }
      });

      renderizarLista();
    }

    function renderizarLista() {
      const grid = document.getElementById('grid-itens');
      grid.innerHTML = '';

      const listaCompleta = obterItensCategoriaAtiva();
      const temBotaoRemover = (categoriaAtiva !== 'corpo');

      let totalItensVirtuais = listaCompleta.length;
      if (temBotaoRemover) totalItensVirtuais += 1; 

      const totalPaginas = Math.max(1, Math.ceil(totalItensVirtuais / itensPorPagina));
      
      let itensDaPagina = [];
      let inicio = (paginaAtual - 1) * itensPorPagina;

      if (temBotaoRemover) {
        if (paginaAtual === 1) {
          const slotNenhum = document.createElement('div');
          slotNenhum.className = 'slot-item remover';
          slotNenhum.innerText = 'Ø';
          const camadaAlvo = listaCompleta[0]?.camada || `camada-${categoriaAtiva}`;
          slotNenhum.onclick = () => tirarItem(camadaAlvo);
          grid.appendChild(slotNenhum);

          itensDaPagina = listaCompleta.slice(0, itensPorPagina - 1);
        } else {
          inicio = ((paginaAtual - 1) * itensPorPagina) - 1;
          itensDaPagina = listaCompleta.slice(inicio, inicio + itensPorPagina);
        }
      } else {
        itensDaPagina = listaCompleta.slice(inicio, inicio + itensPorPagina);
      }

      itensDaPagina.forEach(item => {
        const slot = document.createElement('div');
        slot.className = 'slot-item';

        if (item.tipo === 'corpo') {
          slot.onclick = () => trocarPersonagem(item.arquivo);
          const img = document.createElement('img');
          img.src = item.arquivo + '.webp';
          slot.appendChild(img);
        } else {
          slot.onclick = () => colocarItem(item.camada, item.arquivo);
          const img = document.createElement('img');
          img.src = item.arquivo;
          slot.appendChild(img);
        }

        grid.appendChild(slot);
      });

      document.getElementById('label-pagina').innerText = `PAGE ${paginaAtual}/${totalPaginas}`;
      document.getElementById('btn-ant').disabled = (paginaAtual === 1);
      document.getElementById('btn-prox').disabled = (paginaAtual === totalPaginas);
    }

    function paginaAnterior() {
      if (paginaAtual > 1) {
        paginaAtual--;
        renderizarLista();
      }
    }

    function proximaPagina() {
      const listaCompleta = obterItensCategoriaAtiva();
      const temBotaoRemover = (categoriaAtiva !== 'corpo');
      let totalItensVirtuais = listaCompleta.length + (temBotaoRemover ? 1 : 0);
      const totalPaginas = Math.ceil(totalItensVirtuais / itensPorPagina);

      if (paginaAtual < totalPaginas) {
        paginaAtual++;
        renderizarLista();
      }
    }

    function colocarItem(idCamada, arquivoAcessorio) {
      const camada = document.getElementById(idCamada);
      if(camada) {
        camada.src = arquivoAcessorio;
        camada.style.display = 'block';
      }
    }

    function tirarItem(idCamada) {
      const camada = document.getElementById(idCamada);
      if(camada) {
        camada.src = '';
        camada.style.display = 'none';
      }
    }

    function trocarPersonagem(nomePersonagem) {
      personagemAtivo = nomePersonagem;
      const corpo = document.getElementById('camada-corpo');
      corpo.src = nomePersonagem + '.webp';
      
      paginaAtual = 1;
      renderizarLista();
      aplicarLayoutAcessorios();
    }

    function aplicarLayoutAcessorios() {
      const config = posicoesConfig[personagemAtivo];
      if (!config) return;

      const corpoImg = document.getElementById('camada-corpo');
      if (corpoImg) {
        corpoImg.style.width = config.larguraCorpo || '100%';
        corpoImg.style.height = config.alturaCorpo || '100%';
      }

      const mapeamento = [
        { chave: 'chapeu',   id: 'camada-chapeu' },
        { chave: 'oculos',   id: 'camada-oculos' },
        { chave: 'nariz',    id: 'camada-nariz' },
        { chave: 'acessorio',id: 'camada-acessorio' },
        { chave: 'peitoral', id: 'camada-peitoral' }
      ];

      mapeamento.forEach(item => {
        const elementoHTML = document.getElementById(item.id);
        const dadosEstilo = config[item.chave];

        if (elementoHTML && dadosEstilo) {
          elementoHTML.style.width = dadosEstilo.width;
          elementoHTML.style.top = dadosEstilo.top;
          elementoHTML.style.left = dadosEstilo.left;
        }
      });
    }

    window.onload = function() {
      renderizarLista();
      aplicarLayoutAcessorios();
    };

    function baixarPNG() {
      const areaAvatar = document.getElementById('area-do-avatar');
      html2canvas(areaAvatar, { 
        scale: 2,
        backgroundColor: null 
      }).then(canvas => {
        const link = document.createElement('a');
        link.download = 'meu-avatar.png';
        link.href = canvas.toToDataURL ? canvas.toDataURL('image/png') : canvas.toDataURL();
        link.click();
      });
    }
  </script>
</body>
</html>
